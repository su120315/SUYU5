    // ==================== 加载漫画列表 ====================
    async function loadComicList(type) {
      type = type || 'recommend';
      currentView = 'list';
      if (!currentSource) currentSource = getFastestSource();
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画列表...</p>' +
          '<p class="comic-loading-tips">来源: ' + src.name + '，请稍候</p>' +
        '</div>';

      var path = src.listPaths[type] || src.listPaths.recommend;
      var targetUrl = src.domains[currentDomainIndex] + path;

      try {
        var html = await fetchWithProxies(targetUrl, src.domains[0]);
        var doc = parseHTML(html);

        var cards = findElements(doc, src.selectors.card, 3);

        if (cards.length === 0) {
          var allLinks = doc.querySelectorAll('a[href*="' + src.comicUrlPattern.source.replace(/[\/\\\[\]\(\)]/g, function(c) { return c; }) + '"]');
          if (allLinks.length === 0) {
            allLinks = doc.querySelectorAll('a[href*="/comic"], a[href*="/manga"]');
          }
          log('备用方案: 找到' + allLinks.length + '个链接');
          var seenUrls = {};
          var tempCards = [];
          for (var al = 0; al < allLinks.length; al++) {
            var alHref = fixProxyUrl(allLinks[al].getAttribute('href'), src.domains[currentDomainIndex]);
            if (alHref && !seenUrls[alHref] && alHref.length > 10) {
              seenUrls[alHref] = true;
              var parent = allLinks[al].closest('div, li, article') || allLinks[al].parentElement;
              if (parent) tempCards.push(parent);
            }
          }
          if (tempCards.length >= 3) cards = tempCards;
        }

        if (cards.length === 0) {
          showErrorWithActions('未找到漫画数据', '请尝试切换其他漫画源', true);
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        var seenHrefs = {};
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a[href]');
          if (!link) continue;
          var href = fixProxyUrl(link.getAttribute('href'), src.domains[currentDomainIndex]);
          if (!href || href === '#' || seenHrefs[href]) continue;
          seenHrefs[href] = true;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4, [class*="name"]');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) {
              titleText = txt;
              break;
            }
          }
          if (!titleText && link) titleText = link.textContent.trim().substring(0, 30);

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);
          if (imgSrc) imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);

          var chapterEls = card.querySelectorAll('[class*="chapter"], em, [class*="subtitle"], [class*="info"]');
          var chapterText = '';
          for (var ch = 0; ch < chapterEls.length; ch++) {
            var chtxt = chapterEls[ch].textContent.trim();
            if (chtxt && chtxt.length > 1 && chtxt.length < 40) {
              chapterText = chtxt;
              break;
            }
          }

          if (href && titleText) {
            var safeHref = href.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var safeTitle = titleText.replace(/"/g, '&quot;');
            htmlStr +=
              '<div class="comic-card" data-action="comic-detail" data-url="' + safeHref + '" data-title="' + safeTitle + '">' +
                (imgSrc ? '<img class="comic-card-img" src="' + imgSrc + '" alt="' + safeTitle + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' :
                 '<div class="comic-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>') +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + safeTitle + '</div>' +
                  (chapterText ? '<div class="comic-card-chapter">' + chapterText + '</div>' : '') +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        if (count === 0) {
          showErrorWithActions('未能解析漫画列表', '请尝试切换其他漫画源', true);
          return;
        }

        content.innerHTML = htmlStr;
        showSourceInfo('来源: ' + src.name + ' · 共 ' + count + ' 部', 'ok');
        log('加载 ' + count + ' 部漫画 (' + src.name + ')');
      } catch (e) {
        log('加载列表失败: ' + e.message);
        showErrorWithActions('加载失败', e.message, true, [
          { text: '重试', action: 'loadComicList(\'' + type + '\')' },
          { text: '切换源', action: 'tryNextSource(\'list\',\'' + type + '\')' }
        ]);
      }
    }

    function tryNextSource(viewType, param) {
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var idx = -1;
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].id === currentSource.id) {
          idx = i;
          break;
        }
      }
      var nextIdx = (idx + 1) % COMIC_SOURCES.length;
      currentSource = COMIC_SOURCES[nextIdx];
      currentDomainIndex = 0;

      var tabs = document.querySelectorAll('.source-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].classList.remove('active');
        if (tabs[t].getAttribute('data-id') === currentSource.id) {
          tabs[t].classList.add('active');
        }
      }

      log('自动切换到: ' + currentSource.name);
      if (viewType === 'list') loadComicList(param || 'recommend');
      else if (viewType === 'search') searchComic(param);
      else if (viewType === 'detail') loadComicDetail(currentComicUrl, currentComicTitle);
    }

    function tryNextSourceChapter() {
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var idx = -1;
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].id === currentSource.id) {
          idx = i;
          break;
        }
      }
      var nextIdx = (idx + 1) % COMIC_SOURCES.length;
      currentSource = COMIC_SOURCES[nextIdx];
      currentDomainIndex = 0;

      var tabs = document.querySelectorAll('.source-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].classList.remove('active');
        if (tabs[t].getAttribute('data-id') === currentSource.id) {
          tabs[t].classList.add('active');
        }
      }

      log('自动切换到: ' + currentSource.name);
      if (currentChapterIndex >= 0 && currentChapters.length > 0) {
        loadChapter(currentChapterIndex);
      } else {
        loadComicList('recommend');
      }
    }

    // ==================== 搜索 ====================
    function doSearch() {
      var keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        loadComicList('recommend');
        return;
      }
      searchComic(keyword);
    }

    async function searchComic(keyword) {
      currentView = 'list';
      if (!currentSource) currentSource = getFastestSource();
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在搜索 "' + keyword + '"...</p>' +
          '<p class="comic-loading-tips">来源: ' + src.name + '</p>' +
        '</div>';

      try {
        var searchUrl = src.domains[currentDomainIndex] + src.searchPath + encodeURIComponent(keyword);
        var html = await fetchWithProxies(searchUrl, src.domains[0]);
        var doc = parseHTML(html);

        var cards = findElements(doc, src.selectors.card, 1);

        if (cards.length === 0) {
          var allLinks = doc.querySelectorAll('a[href*="/comic"], a[href*="/manga"]');
          var seenUrls = {};
          var tempCards = [];
          for (var al = 0; al < allLinks.length; al++) {
            var alHref = fixProxyUrl(allLinks[al].getAttribute('href'), src.domains[currentDomainIndex]);
            if (alHref && !seenUrls[alHref] && alHref.length > 10) {
              seenUrls[alHref] = true;
              var parent = allLinks[al].closest('div, li, article') || allLinks[al].parentElement;
              if (parent) tempCards.push(parent);
            }
          }
          if (tempCards.length >= 1) cards = tempCards;
        }

        if (cards.length === 0) {
          content.innerHTML =
            '<div class="comic-error">' +
              '<i data-lucide="search-x"></i>' +
              '<p>未找到 "' + keyword + '" 相关漫画</p>' +
              '<div class="comic-error-actions">' +
                '<button class="comic-error-btn primary" onclick="tryNextSource(\'search\',\'' + keyword.replace(/'/g, "\\'") + '\')">' +
                  '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>换源搜索' +
                '</button>' +
                '<button class="comic-error-btn" onclick="loadComicList(\'recommend\')">' +
                  '<i data-lucide="arrow-left" style="width:14px;height:14px;"></i>返回' +
                '</button>' +
              '</div>' +
            '</div>';
          safeLucide();
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        var seenHrefs = {};
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a[href]');
          if (!link) continue;
          var href = fixProxyUrl(link.getAttribute('href'), src.domains[currentDomainIndex]);
          if (!href || href === '#' || seenHrefs[href]) continue;
          seenHrefs[href] = true;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4, [class*="name"]');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) { titleText = txt; break; }
          }
          if (!titleText && link) titleText = link.textContent.trim().substring(0, 30);

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);
          if (imgSrc) imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);

          if (href && titleText) {
            var safeHref = href.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var safeTitle = titleText.replace(/"/g, '&quot;');
            htmlStr +=
              '<div class="comic-card" data-action="comic-detail" data-url="' + safeHref + '" data-title="' + safeTitle + '">' +
                (imgSrc ? '<img class="comic-card-img" src="' + imgSrc + '" alt="' + safeTitle + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' :
                 '<div class="comic-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>') +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + safeTitle + '</div>' +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        content.innerHTML = htmlStr;
        showSourceInfo('来源: ' + src.name + ' · 找到 ' + count + ' 个结果', 'ok');
      } catch (e) {
        showErrorWithActions('搜索失败', e.message, true, [
          { text: '换源搜索', action: 'tryNextSource(\'search\',\'' + keyword.replace(/'/g, "\\'") + '\')' },
          { text: '返回', action: 'loadComicList(\'recommend\')' }
        ]);
      }
    }

    // ==================== 漫画详情 ====================
    async function loadComicDetail(comicUrl, fallbackTitle) {
      currentView = 'detail';
      currentComicUrl = comicUrl;
      currentComicTitle = fallbackTitle || '';
      currentOfflineChapterIndices = null; // 非离线模式
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画详情...</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchWithProxies(comicUrl, src.domains[0]);
        var doc = parseHTML(html);

        var titleText = findFirstText(doc, src.selectors.title) || fallbackTitle || '未知漫画';
        var authorText = findFirstText(doc, src.selectors.author);
        var descText = findFirstText(doc, src.selectors.desc);

        var coverSrc = '';
        for (var ci = 0; ci < src.selectors.cover.length; ci++) {
          var cel = doc.querySelector(src.selectors.cover[ci]);
          if (cel) {
            coverSrc = getImgSrc(cel);
            if (coverSrc) {
              coverSrc = fixProxyUrl(coverSrc, src.domains[currentDomainIndex]);
              break;
            }
          }
        }

        var tagsHtml = '';
        var tagContainer = doc.querySelector('[class*="tag"]:not([class*="nav"]):not(nav), .tags, .tag-list');
        if (tagContainer) {
          var tags = tagContainer.querySelectorAll('span, a');
          for (var ti = 0; ti < tags.length; ti++) {
            var ttxt = tags[ti].textContent.trim();
            if (ttxt && ttxt.length >= 2 && ttxt.length < 15) {
              tagsHtml += '<span class="comic-detail-tag">' + ttxt + '</span>';
            }
          }
        }

        var chapterLinks = findElements(doc, src.selectors.chapters, 3);

        if (chapterLinks.length < 3) {
          var allLinks = doc.querySelectorAll('a[href]');
          var seenCh = {};
          for (var al2 = 0; al2 < allLinks.length; al2++) {
            var hr = fixProxyUrl(allLinks[al2].getAttribute('href'), src.domains[currentDomainIndex]);
            var txt = allLinks[al2].textContent.trim();
            if (hr && txt && (hr.indexOf('chapter') !== -1 || hr.indexOf('read') !== -1 || hr.match(/\d+\.html/)) && txt.length < 30) {
              if (!seenCh[hr]) {
                seenCh[hr] = true;
              }
            }
          }
        }

        currentChapters = [];
        var seenChapterUrls = {};
        for (var cl = 0; cl < chapterLinks.length; cl++) {
          var chLink = chapterLinks[cl];
          var chref = fixProxyUrl(chLink.getAttribute('href'), src.domains[currentDomainIndex]);
          var chtext = chLink.textContent.trim();
          if (chref && chtext && !seenChapterUrls[chref] && chtext.length < 50) {
            seenChapterUrls[chref] = true;
            currentChapters.push({ url: chref, title: chtext });
          }
        }

        if (currentChapters.length > 1) {
          sortChapters(currentChapters);
        }

        var chapterHtml = '';
        for (var ch = 0; ch < currentChapters.length; ch++) {
          chapterHtml += '<div class="chapter-item" data-action="load-chapter" data-index="' + ch + '">' + currentChapters[ch].title + '</div>';
        }

        var safeTitle = titleText.replace(/"/g, '&quot;');
        var chapterSearchHtml =
          '<div class="chapter-toolbar">' +
            '<div class="chapter-search-wrap">' +
              '<i data-lucide="search" style="width:14px;height:14px;"></i>' +
              '<input type="text" class="chapter-search-input" placeholder="搜索章节..." data-action="chapter-search">' +
            '</div>' +
            '<div class="chapter-quick-actions">' +
              '<button data-action="chapter-first" title="第一话"><i data-lucide="chevrons-left" style="width:14px;height:14px;"></i></button>' +
              '<button data-action="chapter-current" title="当前话"><i data-lucide="circle-dot" style="width:14px;height:14px;"></i></button>' +
              '<button data-action="chapter-last" title="最后一话"><i data-lucide="chevrons-right" style="width:14px;height:14px;"></i></button>' +
            '</div>' +
          '</div>';

        var chapterHtml = generateChapterList(currentChapters);

        var downloadSectionHtml = '';
        if (isComicDownloaded(comicUrl)) {
          downloadSectionHtml =
            '<div class="comic-download-section">' +
              '<div class="comic-downloaded-badge" style="margin-bottom:10px;">' +
                '<i data-lucide="check-circle" style="width:18px;height:18px;color:#22c55e;"></i>' +
                '<span>已下载到内存 · 可离线观看</span>' +
                '<button class="remove-download-btn" data-action="remove-download">删除下载</button>' +
              '</div>' +
              '<button class="download-comic-btn" data-action="download-comic">' +
                '<i data-lucide="download" style="width:16px;height:16px;"></i>' +
                '<span>继续下载其他章节</span>' +
              '</button>' +
            '</div>';
        } else {
          downloadSectionHtml =
            '<div class="comic-download-section">' +
              '<button class="download-comic-btn" data-action="download-comic">' +
                '<i data-lucide="download-cloud" style="width:18px;height:18px;"></i>' +
                '<span>选择章节下载到内存 (离线观看)</span>' +
              '</button>' +
            '</div>';
        }

        // 阅读历史：继续阅读按钮
        var historyHtml = '';
        var history = getReadingHistory(comicUrl);
        if (history && history.chapterIndex < currentChapters.length) {
          var histTitle = (history.chapterTitle || currentChapters[history.chapterIndex].title || '').replace(/"/g, '&quot;');
          historyHtml =
            '<div class="reading-history-hint" style="margin-top:12px;">' +
              '<i data-lucide="history" style="width:14px;height:14px;"></i>' +
              '<span>上次阅读：' + histTitle + '</span>' +
              '<button class="continue-reading-btn" data-action="continue-reading" data-index="' + history.chapterIndex + '">' +
                '<i data-lucide="play" style="width:14px;height:14px;"></i>' +
                '继续阅读' +
              '</button>' +
            '</div>';
        }

        // 书签列表
        var bookmarkListHtml = '';
        var bms = getBookmarks(comicUrl);
        if (bms.length > 0) {
          // 按时间倒序
          bms = bms.slice().sort(function(a, b) { return b.timestamp - a.timestamp; });
          var bmsItems = '';
          for (var bi = 0; bi < bms.length; bi++) {
            if (bms[bi].chapterIndex >= currentChapters.length) continue;
            var bmTitle = (bms[bi].chapterTitle || currentChapters[bms[bi].chapterIndex].title || ('第' + (bms[bi].chapterIndex + 1) + '话')).replace(/"/g, '&quot;');
            bmsItems +=
              '<div class="bookmark-item" data-action="load-chapter" data-index="' + bms[bi].chapterIndex + '">' +
                '<span><i data-lucide="bookmark" style="width:12px;height:12px;color:#f59e0b;margin-right:6px;"></i>' + bmTitle + '</span>' +
                '<span class="bookmark-item-remove" data-action="remove-bookmark" data-index="' + bms[bi].chapterIndex + '" title="移除书签">' +
                  '<i data-lucide="x" style="width:14px;height:14px;"></i>' +
                '</span>' +
              '</div>';
          }
          if (bmsItems) {
            bookmarkListHtml =
              '<div class="bookmark-list-section">' +
                '<div class="bookmark-list-title">' +
                  '<i data-lucide="bookmark" style="width:14px;height:14px;color:#f59e0b;"></i>' +
                  '我的书签 (' + bms.length + ')' +
                '</div>' +
                bmsItems +
              '</div>';
          }
        }

        // 追漫按钮
        var followed = isFollowed(comicUrl);
        var followBtnHtml =
          '<div class="follow-btn-section">' +
            '<button class="follow-comic-btn' + (followed ? ' followed' : '') + '" data-action="toggle-follow">' +
              '<i data-lucide="' + (followed ? 'heart' : 'heart') + '" style="width:18px;height:18px;' + (followed ? 'fill:currentColor;' : '') + '"></i>' +
              '<span>' + (followed ? '已追漫' : '追漫') + '</span>' +
            '</button>' +
            '<button class="follow-comic-btn secondary" data-action="go-shelf" title="打开书架">' +
              '<i data-lucide="library-big" style="width:18px;height:18px;"></i>' +
              '<span>书架</span>' +
            '</button>' +
          '</div>';

        content.innerHTML =
          '<div class="comic-detail">' +
            '<button class="comic-back-btn" data-action="back-list">' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回列表' +
            '</button>' +
            '<div class="comic-detail-header">' +
              (coverSrc ? '<img class="comic-detail-cover" src="' + coverSrc + '" alt="' + safeTitle + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' : '') +
              '<div class="comic-detail-meta">' +
                '<div class="comic-detail-title">' + safeTitle + '</div>' +
                (authorText ? '<div class="comic-detail-author">' + authorText + '</div>' : '') +
                '<div class="comic-detail-tags">' + tagsHtml + '</div>' +
                (descText ? '<div class="comic-detail-desc">' + descText.substring(0, 200) + '</div>' : '') +
              '</div>' +
            '</div>' +
            followBtnHtml +
            historyHtml +
            bookmarkListHtml +
            downloadSectionHtml +
            '<h3 style="font-size:1.05rem;margin-bottom:12px;color:var(--text-primary);">章节列表 (' + currentChapters.length + '话)</h3>' +
            chapterSearchHtml +
            '<div class="chapter-list" id="chapterList">' + chapterHtml + '</div>' +
          '</div>';
        safeLucide();
      } catch (e) {
        showErrorWithActions('加载详情失败', e.message, true, [
          { text: '重试', action: 'loadComicDetail("' + comicUrl.replace(/'/g, "\\'") + '", "' + (fallbackTitle || '').replace(/'/g, "\\'") + '")' },
          { text: '换源', action: 'tryNextSourceChapter()' },
          { text: '返回列表', action: 'goBackToList()' }
        ]);
      }
    }

    // ==================== 阅读器 ====================
    function goBackToDetail() {
      stopAutoScroll();
      if (offlineLibrary[currentComicUrl]) {
        openOfflineComic(currentComicUrl);
      } else {
        loadComicDetail(currentComicUrl, currentComicTitle);
      }
    }

    function isOfflineMode() {
      return currentOfflineChapterIndices !== null;
    }

    // ==================== 阅读历史 ====================
    function loadReadingHistory() {
      try {
        var saved = localStorage.getItem('suyu-reading-history');
        if (saved) readingHistory = JSON.parse(saved);
      } catch(e) { readingHistory = {}; }
    }

    function saveReadingHistory() {
      try {
        localStorage.setItem('suyu-reading-history', JSON.stringify(readingHistory));
      } catch(e) {}
    }

    function recordReadingHistory(comicUrl, title, chapterIndex, chapterTitle) {
      readingHistory[comicUrl] = {
        title: title,
        chapterIndex: chapterIndex,
        chapterTitle: chapterTitle,
        timestamp: Date.now()
      };
      saveReadingHistory();
    }

    function getReadingHistory(comicUrl) {
      return readingHistory[comicUrl] || null;
    }

    // ==================== 书签 ====================
    function loadBookmarks() {
      try {
        var saved = localStorage.getItem('suyu-bookmarks');
        if (saved) bookmarks = JSON.parse(saved);
      } catch(e) { bookmarks = {}; }
    }

    function saveBookmarks() {
      try {
        localStorage.setItem('suyu-bookmarks', JSON.stringify(bookmarks));
      } catch(e) {}
    }

    function getBookmarks(comicUrl) {
      return bookmarks[comicUrl] || [];
    }

    function toggleBookmark(comicUrl, chapterIndex, chapterTitle) {
      if (!bookmarks[comicUrl]) bookmarks[comicUrl] = [];
      var existing = -1;
      for (var i = 0; i < bookmarks[comicUrl].length; i++) {
        if (bookmarks[comicUrl][i].chapterIndex === chapterIndex) {
          existing = i;
          break;
        }
      }
      if (existing >= 0) {
        bookmarks[comicUrl].splice(existing, 1);
      } else {
        bookmarks[comicUrl].push({
          chapterIndex: chapterIndex,
          chapterTitle: chapterTitle,
          timestamp: Date.now()
        });
      }
      saveBookmarks();
      return existing < 0; // true=已添加, false=已移除
    }

    function isBookmarked(comicUrl, chapterIndex) {
      var bms = bookmarks[comicUrl];
      if (!bms) return false;
      for (var i = 0; i < bms.length; i++) {
        if (bms[i].chapterIndex === chapterIndex) return true;
      }
      return false;
    }

    // ==================== 追漫 / 书架 ====================
    function loadFollowedComics() {
      try {
        var saved = localStorage.getItem('suyu-followed-comics');
        if (saved) followedComics = JSON.parse(saved);
      } catch(e) { followedComics = {}; }
    }

    function saveFollowedComics() {
      try {
        localStorage.setItem('suyu-followed-comics', JSON.stringify(followedComics));
      } catch(e) {}
    }

    function isFollowed(comicUrl) {
      return !!followedComics[comicUrl];
    }

    // 追漫：true=已追, false=取消追
    function toggleFollowComic(comicUrl, title, cover, sourceId, lastChapterIndex, lastChapterTitle) {
      if (followedComics[comicUrl]) {
        delete followedComics[comicUrl];
        saveFollowedComics();
        return false;
      }
      followedComics[comicUrl] = {
        title: title || '未知漫画',
        cover: cover || '',
        url: comicUrl,
        sourceId: sourceId || (currentSource ? currentSource.id : ''),
        followedAt: Date.now(),
        lastChapterIndex: (typeof lastChapterIndex === 'number') ? lastChapterIndex : -1,
        lastChapterTitle: lastChapterTitle || ''
      };
      saveFollowedComics();
      return true;
    }

    // 更新已追漫画的最后阅读章节
    function updateFollowedProgress(comicUrl, chapterIndex, chapterTitle) {
      if (!followedComics[comicUrl]) return;
      followedComics[comicUrl].lastChapterIndex = chapterIndex;
      followedComics[comicUrl].lastChapterTitle = chapterTitle || '';

    // ==================== 阅读进度条 ====================
    var readerScrollHandler = null;
    function initReaderProgressBar() {
      var bar = document.getElementById('readerProgressBar');
      var fill = document.getElementById('readerProgressFill');
      var label = document.getElementById('readerProgressLabel');
      if (!bar || !fill || !label) return;

      function updateProgress() {
        var scrollTop = window.scrollY;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        if (progress < 0) progress = 0;
        if (progress > 100) progress = 100;
        fill.style.width = progress + '%';
        label.textContent = Math.round(progress) + '%';
      }

      // 移除旧的监听器
      if (readerScrollHandler) {
        window.removeEventListener('scroll', readerScrollHandler);
      }
      readerScrollHandler = function() {
        requestAnimationFrame(updateProgress);
      };
      window.addEventListener('scroll', readerScrollHandler, { passive: true });
      updateProgress();

      // 拖拽 / 点击跳转
      var isDragging = false;
      function seekToEvent(e) {
        var rect = bar.getBoundingClientRect();
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var ratio = (clientX - rect.left) / rect.width;
        if (ratio < 0) ratio = 0;
        if (ratio > 1) ratio = 1;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo({ top: ratio * docHeight, behavior: 'auto' });
        fill.style.width = (ratio * 100) + '%';
        label.textContent = Math.round(ratio * 100) + '%';
      }
      bar.addEventListener('mousedown', function(e) {
        isDragging = true;
        seekToEvent(e);
        e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (isDragging) seekToEvent(e);
      });
      document.addEventListener('mouseup', function() { isDragging = false; });
      // 触摸支持
      bar.addEventListener('touchstart', function(e) {
        isDragging = true;
        seekToEvent(e);
      }, { passive: true });
      bar.addEventListener('touchmove', function(e) {
        if (isDragging) seekToEvent(e);
      }, { passive: true });
      bar.addEventListener('touchend', function() { isDragging = false; });
    }

    // ==================== 章节列表管理 ====================
    function generateChapterList(chapters) {
      if (!chapters || chapters.length === 0) return '';

      var grouped = {};
      for (var i = 0; i < chapters.length; i++) {
        var title = chapters[i].title;
        var groupKey = '其他';
        if (title.match(/第[\d一二三四五六七八九十百]+话/)) groupKey = '正篇';
        else if (title.match(/番外|特别篇|SP/)) groupKey = '番外';
        else if (title.match(/序章|序幕|引子/)) groupKey = '序章';
        else if (title.match(/外传/)) groupKey = '外传';
        else if (title.match(/第[\d一二三四五六七八九十百]+卷/)) groupKey = '单行本';
        else if (title.match(/第[\d一二三四五六七八九十百]+季/)) groupKey = '分季';
        else if (title.match(/OVA|OAD/)) groupKey = 'OVA';

        if (!grouped[groupKey]) grouped[groupKey] = [];
        grouped[groupKey].push({ index: i, title: title });
      }

      var html = '';
      var groupOrder = ['序章', '正篇', '番外', '外传', '单行本', '分季', 'OVA', '其他'];

      for (var g = 0; g < groupOrder.length; g++) {
        var groupName = groupOrder[g];
        if (!grouped[groupName]) continue;

        var items = grouped[groupName];
        html += '<div class="chapter-group">' +
                  '<div class="chapter-group-header" data-action="toggle-group">' +
                    '<i data-lucide="chevron-right" class="group-toggle-icon" style="width:14px;height:14px;"></i>' +
                    '<span>' + groupName + '</span>' +
                    '<span class="group-count">(' + items.length + ')</span>' +
                  '</div>' +
                  '<div class="chapter-group-content">';

        for (var j = 0; j < items.length; j++) {
          var isCurrent = items[j].index === currentChapterIndex;
          html += '<div class="chapter-item' + (isCurrent ? ' current' : '') + '" data-action="load-chapter" data-index="' + items[j].index + '">' + items[j].title + '</div>';
        }

        html += '</div></div>';
      }

      return html;
    }

    function filterChapters(keyword) {
      var chapterList = document.getElementById('chapterList');
      if (!chapterList) return;

      var groups = chapterList.querySelectorAll('.chapter-group');
      var keywordLower = keyword.toLowerCase().trim();

      for (var g = 0; g < groups.length; g++) {
        var group = groups[g];
        var items = group.querySelectorAll('.chapter-item');
        var hasMatch = false;

        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var title = item.textContent.toLowerCase();
          if (title.indexOf(keywordLower) !== -1) {
            item.style.display = 'block';
            hasMatch = true;
          } else {
            item.style.display = 'none';
          }
        }

        var header = group.querySelector('.chapter-group-header');
        var content = group.querySelector('.chapter-group-content');
        if (hasMatch) {
          group.style.display = 'block';
          content.style.display = 'block';
          header.querySelector('.group-toggle-icon').style.transform = 'rotate(90deg)';
        } else {
          group.style.display = 'none';
        }
      }
    }

    var CORS_IMAGE_PROXIES = [
      'https://images.weserv.nl/?url=',
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
      'https://cors-anywhere.herokuapp.com/'

    function retryComicImage(img) {
      var wrap = img.parentElement;
      if (!wrap) return;

      var originalSrc = wrap.getAttribute('data-src');
      var backupSrc = wrap.getAttribute('data-backup-src');
      var retryCount = parseInt(wrap.getAttribute('data-retry-count') || '0');

      if (retryCount >= 3) {
        img.style.display = 'none';
        var placeholder = wrap.querySelector('.comic-image-placeholder');
        if (placeholder) {
          placeholder.textContent = '加载失败，点击重试';
          placeholder.style.display = 'flex';
          placeholder.onclick = function() {
            wrap.setAttribute('data-retry-count', '0');
            img.style.display = 'block';
            img.src = originalSrc;
            placeholder.style.display = 'none';
          };
        }
        return;
      }

      retryCount++;
      wrap.setAttribute('data-retry-count', retryCount.toString());

      var proxyUrl = CORS_IMAGE_PROXIES[(retryCount - 1) % CORS_IMAGE_PROXIES.length];
      var newSrc = proxyUrl + encodeURIComponent(originalSrc);

      log('图片重试 (' + retryCount + ') 使用代理: ' + newSrc.substring(0, 60));
      img.src = newSrc;
    }

      var added = toggleBookmark(currentComicUrl, idx, chTitle);
      // 更新按钮 UI
      if (added) {
        this.classList.add('active');
        this.title = '移除书签';
      } else {
        this.classList.remove('active');
        this.title = '添加书签';
      }
      // 更新图标 fill
      var icon = this.querySelector('i[data-lucide], svg');
      if (icon) {
        if (icon.tagName === 'I') {
          icon.setAttribute('style', 'width:18px;height:18px;' + (added ? 'fill:currentColor;' : ''));
        } else {
          icon.setAttribute('fill', added ? 'currentColor' : 'none');
        }
      }
      safeLucide();
    });

    // 书签列表中的移除按钮
    registerHandler('click', '[data-action="remove-bookmark"]', function(e) {
      e.stopPropagation();
      var idx = parseInt(this.getAttribute('data-index'));
      if (isNaN(idx)) return;
      var chTitle = currentChapters[idx] ? currentChapters[idx].title : '';
      toggleBookmark(currentComicUrl, idx, chTitle); // 再次 toggle 即移除
      // 刷新详情页
      loadComicDetail(currentComicUrl, currentComicTitle);
    });

    // 追漫 / 取消追漫
    registerHandler('click', '[data-action="toggle-follow"]', function() {
      var coverImg = document.querySelector('.comic-detail-cover');
      var coverSrc = coverImg ? coverImg.getAttribute('src') : '';
      var srcId = currentSource ? currentSource.id : '';
      // 带上当前阅读历史
      var hist = getReadingHistory(currentComicUrl);
      var lastIdx = hist ? hist.chapterIndex : -1;
      var lastTitle = hist ? hist.chapterTitle : '';
      var followed = toggleFollowComic(currentComicUrl, currentComicTitle, coverSrc, srcId, lastIdx, lastTitle);
      // 更新按钮 UI
      var span = this.querySelector('span');
      var icon = this.querySelector('i[data-lucide], svg');
      if (followed) {
        this.classList.add('followed');
        if (span) span.textContent = '已追漫';
        if (icon && icon.tagName === 'I') {
          icon.setAttribute('style', 'width:18px;height:18px;fill:currentColor;');
        }
      } else {
        this.classList.remove('followed');
        if (span) span.textContent = '追漫';
        if (icon && icon.tagName === 'I') {
          icon.setAttribute('style', 'width:18px;height:18px;');
        }
      }
      safeLucide();
    });

    // 打开书架
    registerHandler('click', '[data-action="go-shelf"]', function() {
      showFollowedLibrary();
    });

    // 打开已追漫画
    registerHandler('click', '[data-action="open-followed-comic"]', function(e) {
      if (e.target.closest('[data-action="unfollow-comic"]')) return;
      var url = this.getAttribute('data-url');
      var sourceId = this.getAttribute('data-source') || '';
      if (url) openFollowedComic(url, sourceId);
    });

    // 取消追漫
    registerHandler('click', '[data-action="unfollow-comic"]', function(e) {
      e.stopPropagation();
      var url = this.getAttribute('data-url');
      if (url && followedComics[url]) {
        delete followedComics[url];
        saveFollowedComics();
        showFollowedLibrary();
      }
    });

    // 章节搜索防抖处理
    var debouncedFilter = debounce(filterChapters, 200);
    document.addEventListener('input', function(e) {
      var target = e.target;
      while (target) {
        if (target.matches && target.matches('[data-action="chapter-search"]')) {
          debouncedFilter(target.value);
          return;
        }
        target = target.parentElement;
      }
    });

    // ==================== 章节预加载 ====================
    var preloadedChapters = {};

    function preloadAdjacentChapters(currentIndex) {
      // 预加载下一章
      if (currentIndex < currentChapters.length - 1) {
        preloadChapterImages(currentIndex + 1);
      }
      // 预加载上一章
      if (currentIndex > 0) {
        preloadChapterImages(currentIndex - 1);
      }
    }

    async function preloadChapterImages(index) {
      var key = 'ch_' + index;
      if (preloadedChapters[key]) return;
      preloadedChapters[key] = [];

      var chapter = currentChapters[index];
      if (!chapter) return;

      try {
        var src = currentSource || COMIC_SOURCES[0];
        var html = await fetchWithProxies(chapter.url, src.domains[0]);
        var doc = parseHTML(html);
        var images = [];

        var scriptImages = extractImagesFromScript(html);
        if (scriptImages.length >= 5) {
          images = scriptImages;
        } else {
          var containerSelectors = src.selectors.images || ['.comic-content', 'article'];
          for (var cs = 0; cs < containerSelectors.length; cs++) {
            var container = doc.querySelector(containerSelectors[cs]);
            if (container) {
              var imgs = container.querySelectorAll('amp-img, img');
              for (var i = 0; i < imgs.length; i++) {
                var imgsrc = getImgSrc(imgs[i]);
                imgsrc = imgsrc ? fixProxyUrl(imgsrc, src.domains[currentDomainIndex]) : '';
                if (imgsrc && imgsrc.indexOf('http') === 0 && imgsrc.length > 30) {
                  images.push(imgsrc);
                }
              }
              if (images.length >= 3) break;
            }
          }
        }

        // 用 Image 对象预加载图片到浏览器缓存
        for (var p = 0; p < images.length; p++) {
          var fixedUrl = fixProxyUrl(images[p], src.domains[currentDomainIndex]);
          if (fixedUrl.indexOf('//') === 0) fixedUrl = 'https:' + fixedUrl;
          var preloadImg = new Image();
          preloadImg.src = fixedUrl;
          preloadedChapters[key].push(fixedUrl);
        }
        log('预加载第' + (index + 1) + '话: ' + images.length + '张图片');
      } catch (e) {
        log('预加载第' + (index + 1) + '话失败: ' + e.message);
      }
    }

    // ==================== 阅读器触摸手势 ====================
    var touchStartX = 0;
    var touchStartY = 0;
    var touchStartTime = 0;

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (currentView !== 'reader') return;

      var touchEndX = e.changedTouches[0].clientX;
      var touchEndY = e.changedTouches[0].clientY;
      var diffX = touchEndX - touchStartX;
      var diffY = touchEndY - touchStartY;
      var duration = Date.now() - touchStartTime;

      // 点击翻页：移动距离小 + 时间短 = 点击
      if (Math.abs(diffX) < 10 && Math.abs(diffY) < 10 && duration < 300) {
        var target = e.target;
        // 跳过点击按钮、链接等交互元素
        while (target && target !== document.body) {
          if (target.tagName === 'BUTTON' || target.tagName === 'A' || target.tagName === 'INPUT') return;
          target = target.parentElement;
        }
        handleReaderTap(touchEndY);
      }
    });

    // 点击翻页逻辑（哔哩哔哩漫画式）
    function handleReaderTap(clickY) {
      var screenHeight = window.innerHeight;
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      var scrollHeight = document.documentElement.scrollHeight;
      var remaining = scrollHeight - scrollTop - screenHeight;

      if (clickY > screenHeight * 0.45) {
        // 点击下半屏：向下滚动约 75% 屏幕高度（留一点重叠，避免跳失内容）
        var scrollDist = Math.min(Math.floor(screenHeight * 0.75), remaining);
        if (remaining > 30) {
          window.scrollBy({ top: scrollDist, left: 0, behavior: 'smooth' });
        } else if (currentChapterIndex < currentChapters.length - 1) {
          loadChapter(currentChapterIndex + 1);
        }
      } else {
        // 点击上半屏：向上滚动约 75% 屏幕高度
        var upDist = Math.min(Math.floor(screenHeight * 0.75), scrollTop);
        if (scrollTop > 30) {
          window.scrollBy({ top: -upDist, left: 0, behavior: 'smooth' });
        } else if (currentChapterIndex > 0) {
          loadChapter(currentChapterIndex - 1);
        }
      }
    }

    // 桌面端点击翻页（无延迟）
    document.addEventListener('click', function(e) {
      if (currentView !== 'reader') return;
      // 跳过交互元素
      if (e.target.closest('button') || e.target.closest('a') || e.target.closest('input')) return;
      // 单击：立即翻页
      handleReaderTap(e.clientY);
    });

    // ==================== 自动滚动 ====================
    var autoScrollActive = false;
    var autoScrollSpeed = 2;
    var autoScrollRafId = null;
    var autoScrollSpeeds = [1, 2, 3, 5, 8];
    var autoScrollSpeedIndex = 1;

    function startAutoScroll() {
      if (autoScrollActive) return;
      autoScrollActive = true;
      updateAutoScrollUI();
      autoScrollLoop();
    }

    function stopAutoScroll() {
      autoScrollActive = false;
      if (autoScrollRafId) {
        cancelAnimationFrame(autoScrollRafId);
        autoScrollRafId = null;
      }
      updateAutoScrollUI();
    }

    function toggleAutoScroll() {
      if (autoScrollActive) {
        stopAutoScroll();
      } else {
        startAutoScroll();
      }
    }

    function autoScrollLoop() {
      if (!autoScrollActive) return;

      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      var scrollHeight = document.documentElement.scrollHeight;
      var screenHeight = window.innerHeight;
      var remaining = scrollHeight - scrollTop - screenHeight;

      if (remaining > 5) {
        window.scrollBy(0, autoScrollSpeed);
        autoScrollRafId = requestAnimationFrame(autoScrollLoop);
      } else {
        if (currentChapterIndex < currentChapters.length - 1) {
          stopAutoScroll();
          loadChapter(currentChapterIndex + 1);
        } else {
          stopAutoScroll();
        }
      }
    }

    function increaseAutoScrollSpeed() {
      if (autoScrollSpeedIndex < autoScrollSpeeds.length - 1) {
        autoScrollSpeedIndex++;
        autoScrollSpeed = autoScrollSpeeds[autoScrollSpeedIndex];
        updateAutoScrollUI();
      }
    }

    function decreaseAutoScrollSpeed() {
      if (autoScrollSpeedIndex > 0) {
        autoScrollSpeedIndex--;
        autoScrollSpeed = autoScrollSpeeds[autoScrollSpeedIndex];
        updateAutoScrollUI();
      }
    }

    function updateAutoScrollUI() {
      var btns = document.querySelectorAll('.auto-scroll-play-btn');
      for (var i = 0; i < btns.length; i++) {
        if (autoScrollActive) {
          btns[i].classList.add('active');
          var icon = btns[i].querySelector('svg, i');
          if (icon) {
            if (icon.tagName === 'I') {
              icon.setAttribute('data-lucide', 'pause');
            } else if (icon.tagName === 'SVG') {
              icon.innerHTML = '<path d="M10 18h4V6h-4v12zm8-12v12h4V6h-4z"/>';
            }
          }
        } else {
          btns[i].classList.remove('active');
          var icon = btns[i].querySelector('svg, i');
          if (icon) {
            if (icon.tagName === 'I') {
              icon.setAttribute('data-lucide', 'play');
            } else if (icon.tagName === 'SVG') {
              icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
          }
        }
      }
      var speedLabels = document.querySelectorAll('.auto-scroll-speed');
      for (var j = 0; j < speedLabels.length; j++) {
        speedLabels[j].textContent = autoScrollSpeed + 'x';
      }
      var minusBtns = document.querySelectorAll('.auto-scroll-minus-btn');
      for (var k = 0; k < minusBtns.length; k++) {
        minusBtns[k].disabled = autoScrollSpeedIndex === 0;
      }
      var plusBtns = document.querySelectorAll('.auto-scroll-plus-btn');
      for (var l = 0; l < plusBtns.length; l++) {
        plusBtns[l].disabled = autoScrollSpeedIndex === autoScrollSpeeds.length - 1;
      }
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        safeLucide();
      }
    }

    registerHandler('click', '.auto-scroll-play-btn', function(e) {
      e.stopPropagation();
      toggleAutoScroll();
    });

    registerHandler('click', '.auto-scroll-plus-btn', function(e) {
      e.stopPropagation();
      increaseAutoScrollSpeed();
    });

    registerHandler('click', '.auto-scroll-minus-btn', function(e) {
      e.stopPropagation();
      decreaseAutoScrollSpeed();
    });

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
      // 只在阅读器视图中生效
      if (currentView !== 'reader') return;
      // 在输入框中不触发
      var tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;

      switch (e.key) {
        case 'ArrowLeft':
          // 上一话
          if (currentChapterIndex > 0) {
            e.preventDefault();
            loadChapter(currentChapterIndex - 1);
          }
          break;
        case 'ArrowRight':
          // 下一话
          if (currentChapterIndex < currentChapters.length - 1) {
            e.preventDefault();
            loadChapter(currentChapterIndex + 1);
          }
          break;
        case ' ':
        case 'Spacebar':
          // 空格：切换自动滚动
          e.preventDefault();
          toggleAutoScroll();
          break;
        case '+':
        case '=':
          // 加速
          e.preventDefault();
          increaseAutoScrollSpeed();
          break;
        case '-':
        case '_':
          // 减速
          e.preventDefault();
          decreaseAutoScrollSpeed();
          break;
        case 'b':
        case 'B':
          // 切换书签
          {
            var bmBtn = document.querySelector('[data-action="toggle-bookmark"]');
            if (bmBtn) bmBtn.click();
          }
          break;
        case 't':
        case 'T':
          // 切换主题
          e.preventDefault();
          toggleComicTheme();
          break;
        case 'Escape':
          // 返回详情
          e.preventDefault();
          goBackToDetail();
          break;
        case 'Home':
          // 滚动到顶部
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          break;
        case 'End':
          // 滚动到底部
          e.preventDefault();
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
          break;
      }
    });

    // ==================== 初始化 ====================
    initSourceTabs();
    currentSource = COMIC_SOURCES[0];
    safeLucide();
    log('漫画模块初始化完成');

    // 注册 Service Worker（离线缓存页面）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        log('Service Worker 注册成功');
      }).catch(function(err) {
        log('Service Worker 注册失败: ' + err.message);
      });
    }

    // 从 IndexedDB 恢复离线漫画
    restoreOfflineLibrary();

    // 等待 Lucide 加载完成后重新初始化图标
    var lucideRetryCount = 0;
    function waitForLucide() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        safeLucide();
        log('Lucide 加载完成，图标已初始化');
      } else if (lucideRetryCount < 20) {
        lucideRetryCount++;
        setTimeout(waitForLucide, 500);
      }
    }
    if (typeof lucide === 'undefined') {
      setTimeout(waitForLucide, 500);
    }

    // 离线检测：无网时直接显示离线书架
    function showOfflineNotice() {
      var content = document.getElementById('comicContent');
      var hasOffline = Object.keys(offlineLibrary).length > 0;
      var hasFollowed = Object.keys(followedComics).length > 0;
      if (hasOffline || hasFollowed) {
        content.innerHTML =
          '<div class="offline-empty">' +
            '<i data-lucide="wifi-off"></i>' +
            '<p>当前处于离线状态</p>' +
            '<p style="font-size:0.82rem;margin-top:8px;">离线漫画 ' + Object.keys(offlineLibrary).length + ' 部 · 追漫 ' + Object.keys(followedComics).length + ' 部</p>' +
            '<div class="comic-error-actions" style="margin-top:20px;gap:10px;justify-content:center;">' +
              (hasFollowed ? '<button class="comic-error-btn primary" onclick="showFollowedLibrary()" style="background:linear-gradient(135deg,#f472b6,#ec4899);">我的书架</button>' : '') +
              (hasOffline ? '<button class="comic-error-btn primary" onclick="showOfflineLibrary()">离线书架</button>' : '') +
            '</div>' +
          '</div>';
      } else {
        content.innerHTML =
          '<div class="offline-empty">' +
            '<i data-lucide="wifi-off"></i>' +
            '<p>当前处于离线状态</p>' +
            '<p style="font-size:0.82rem;margin-top:8px;">离线书架为空，请联网后下载漫画</p>' +
          '</div>';
      }
      hideSourceInfo();
      safeLucide();
    }

    // 加载漫画列表（联网时）或显示离线提示
    setTimeout(function() {
      if (!navigator.onLine) {
        log('检测到离线状态，显示离线提示');
        showOfflineNotice();
      } else if (currentSource) {
        loadComicList('recommend');
      }
    }, 200);

    // 监听网络状态变化
    window.addEventListener('offline', function() {
      log('网络已断开');
      showOfflineNotice();
    });
    window.addEventListener('online', function() {
      log('网络已恢复');
      if (currentView === 'list' || currentView === 'offline') {
        loadComicList('recommend');
      }
    });

    // 离线书架按钮
    document.getElementById('offlineLibraryBtn').addEventListener('click', function() {
      showOfflineLibrary();
    });
    // 我的书架按钮
    document.getElementById('followedLibraryBtn').addEventListener('click', function() {
      showFollowedLibrary();
    });
    // 取消下载按钮 - 立即中断所有进行中的请求
    document.getElementById('downloadCancelBtn').addEventListener('click', function() {
      downloadCancelled = true;
      if (downloadAbortController) {
        try { downloadAbortController.abort(); } catch(e) {}
      }
      hideDownloadProgress();
    });
  </script>
</body>
</html>
