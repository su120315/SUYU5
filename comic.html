<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>漫画 | 蘇魚</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0" defer onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js';"></script>
  <link rel="stylesheet" href="style.css">
  <meta name="referrer" content="no-referrer">
  <style>
    .comic-page {
      min-height: 100vh;
      padding-top: 80px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .comic-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .comic-header h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comic-header h1 .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gradient-short);
      color: #fff;
      font-weight: 500;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-home:hover {
      border-color: var(--accent-primary);
      transform: translateX(-2px);
    }

    .comic-search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .comic-search-wrap {
      display: flex;
      gap: 10px;
      max-width: 500px;
    }

    .comic-search-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .comic-search-input:focus {
      border-color: var(--accent-primary);
    }

    .comic-search-input::placeholder {
      color: var(--text-muted);
    }

    .comic-search-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .comic-search-btn:hover {
      transform: scale(1.03);
    }

    .comic-search-btn:active {
      transform: scale(0.98);
    }

    .comic-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .comic-tag {
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .comic-tag:hover,
    .comic-tag.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .comic-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      transition: all 0.3s;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .comic-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: var(--bg-tertiary);
      display: block;
    }

    .comic-card-info {
      padding: 10px 12px;
    }

    .comic-card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-card-chapter {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .comic-loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .comic-loading-tips {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .comic-error {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .comic-error svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }

    .comic-error-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .comic-error-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-error-btn:hover {
      border-color: var(--accent-primary);
    }

    .comic-error-btn.primary {
      background: var(--gradient-short);
      color: #fff;
      border-color: transparent;
    }

    .comic-error-detail {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      max-height: 150px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .comic-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comic-detail-cover {
      width: 140px;
      height: 190px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .comic-detail-meta {
      flex: 1;
      min-width: 200px;
    }

    .comic-detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .comic-detail-author {
      font-size: 0.95rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .comic-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .comic-detail-tag {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .comic-detail-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .comic-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .comic-back-btn:hover {
      border-color: var(--accent-primary);
    }

    .chapter-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .chapter-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      font-size: 0.88rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-reader {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-reader-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .comic-reader-images {
      display: flex;
      flex-direction: column;
      gap: 0;
      will-change: transform;
      -webkit-overflow-scrolling: touch;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
      margin: 0;
      padding: 0;
      will-change: transform;
    }

    .comic-reader-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .comic-reader-nav button {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-reader-nav button:hover:not(:disabled) {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: #fff;
    }

    .comic-reader-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .comic-reader-nav .nav-center {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .auto-scroll-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
    }

    .auto-scroll-btn {
      width: 28px;
      height: 28px;
      padding: 0 !important;
      border-radius: 50% !important;
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      background: transparent !important;
      border: none !important;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .auto-scroll-btn:hover {
      background: var(--accent-primary) !important;
      color: #fff !important;
    }

    .auto-scroll-btn.active {
      background: var(--accent-primary) !important;
      color: #fff !important;
    }

    .auto-scroll-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .auto-scroll-speed {
      font-size: 0.78rem;
      color: var(--text-muted);
      min-width: 32px;
      text-align: center;
    }

    /* ==================== 阅读进度条 ==================== */
    .reader-progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--bg-tertiary);
      z-index: 200;
      cursor: pointer;
    }

    .reader-progress-fill {
      height: 100%;
      background: var(--gradient-short);
      border-radius: 0 4px 4px 0;
      transition: width 0.1s linear;
      position: relative;
    }

    .reader-progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-primary);
      box-shadow: 0 0 6px rgba(99,102,241,0.5);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .reader-progress-bar:hover .reader-progress-fill::after {
      opacity: 1;
    }

    .reader-progress-label {
      position: fixed;
      top: 8px;
      right: 16px;
      font-size: 0.72rem;
      color: var(--text-muted);
      z-index: 201;
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      pointer-events: none;
    }

    /* ==================== 书签按钮 ==================== */
    .bookmark-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      vertical-align: middle;
    }

    .bookmark-btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .bookmark-btn.active {
      color: #f59e0b;
      border-color: #f59e0b;
    }

    /* ==================== 继续阅读提示 ==================== */
    .continue-reading-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .continue-reading-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    /* ==================== 书签列表 ==================== */
    .bookmark-list-section {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 12px;
    }

    .bookmark-list-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bookmark-item:hover {
      border-left: 3px solid #f59e0b;
      padding-left: 9px;
    }

    .bookmark-item-remove {
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .bookmark-item-remove:hover {
      color: #ef4444;
    }

    /* ==================== 主题按钮 ==================== */
    .comic-theme-btn:hover {
      border-color: var(--accent-primary);
      transform: scale(1.05);
    }

    /* ==================== 阅读历史提示 ==================== */
    .reading-history-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 100px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      font-size: 0.78rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    /* ==================== 追漫按钮 ==================== */
    .follow-btn-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .follow-comic-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .follow-comic-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent-primary);
    }

    .follow-comic-btn.followed {
      background: linear-gradient(135deg, #f472b6, #ec4899);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
    }

    .follow-comic-btn.secondary {
      background: var(--bg-secondary);
    }

    /* ==================== 书架卡片 ==================== */
    .followed-library-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: linear-gradient(135deg, #f472b6, #ec4899);
      border: none;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .followed-library-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .followed-card {
      position: relative;
    }

    .followed-card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 100px;
      background: linear-gradient(135deg, #f472b6, #ec4899);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 500;
    }

    .followed-card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }

    .followed-card-delete:hover {
      background: #ef4444;
      transform: scale(1.1);
    }

    .followed-card-progress {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-info {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-info .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .source-info .source-dot.loading {
      background: #f59e0b;
    }

    .source-info .source-dot.error {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 768px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .comic-card-info {
        padding: 8px 10px;
      }

      .comic-card-title {
        font-size: 0.82rem;
      }

      .comic-card-chapter {
        font-size: 0.72rem;
      }

      .comic-header h1 {
        font-size: 1.3rem;
      }

      .comic-detail-cover {
        width: 100px;
        height: 135px;
      }

      .comic-detail-title {
        font-size: 1.15rem;
      }

      .chapter-list {
        grid-template-columns: 1fr;
      }

      .comic-search-wrap {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .comic-header {
        padding: 16px 14px 12px;
      }

      .comic-search-bar,
      .comic-tags,
      .comic-grid,
      .comic-detail,
      .comic-reader,
      .source-info {
        padding-left: 14px;
        padding-right: 14px;
      }

      .comic-card-title {
        font-size: 0.76rem;
      }
    }

    .source-selector {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-selector-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-tab {
      padding: 6px 14px;
      border-radius: 100px;

  <script>
    (function() {
      var AUTH_KEY = '_suyu_auth_' + location.pathname.replace(/[^a-z0-9]/gi, '_');
      var sig = [0xC4, 0xCF, 0x7D, 0x7F].reduce(function(a, b){ return (a << 8) | b; }, 0) >> 0;
      function derive(s) {
        var h = 0x811c9dc5;
        for (var i = 0; i < s.length; i++) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 0x01000193);
        }
        return h;
      }
      function checkAuth() {
        var input = document.getElementById('authInput');
        var error = document.getElementById('authError');
        var overlay = document.getElementById('authOverlay');
        var val = input.value.trim().toLowerCase();
        if (derive(val) === sig) {
          try { localStorage.setItem(AUTH_KEY, '1'); } catch(e) {}
          overlay.style.opacity = '0';

      var type = e.type;
      if (!eventHandlers[type]) return;

      var target = e.target;
      while (target) {
        for (var i = 0; i < eventHandlers[type].length; i++) {
          var h = eventHandlers[type][i];
          if (target.matches && target.matches(h.selector)) {

        }
        target = target.parentElement;

    var DB_NAME = 'suyu-comic-db';

    var idbReady = false;

    function openIDB() {
      return new Promise(function(resolve, reject) {
        if (!window.indexedDB) { reject(new Error('IndexedDB 不支持')); return; }
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function(e) {
          var db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'comicUrl' });
          }
        };
        req.onsuccess = function(e) { idbReady = true; resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }

    function idbPut(comicData) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          // 将 blobUrl 转为 Blob 存储（IndexedDB 可直接存 Blob）
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          store.put(comicData);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbGet(comicUrl) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.get(comicUrl);
          req.onsuccess = function(e) { resolve(e.target.result); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbGetAll() {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.getAll();
          req.onsuccess = function(e) { resolve(e.target.result || []); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbDelete(comicUrl) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          store.delete(comicUrl);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    // blobUrl 转 Blob（用于存储到 IndexedDB）
    function blobUrlToBlob(blobUrl) {
      if (!blobUrl || blobUrl.indexOf('blob:') !== 0) return Promise.resolve(blobUrl);
      return fetch(blobUrl).then(function(r) { return r.blob(); });
    }

    // 从 IndexedDB 恢复所有漫画到 offlineLibrary（Blob → blobUrl）
    async function restoreOfflineLibrary() {
      try {
        var records = await idbGetAll();
        var restoredCount = 0;
        for (var i = 0; i < records.length; i++) {
          var rec = records[i];
          var chapters = [];
          var totalImgs = 0;

          // 新版格式：chaptersMeta + chapterImages（按章分存）
          if (rec.chaptersMeta && rec.chapterImages) {
            for (var ci = 0; ci < rec.chaptersMeta.length; ci++) {
              var chImgs = [];
              if (rec.chapterImages[ci] && Array.isArray(rec.chapterImages[ci])) {
                for (var bi = 0; bi < rec.chapterImages[ci].length; bi++) {
                  var blob = rec.chapterImages[ci][bi];
                  // 放宽 Blob 检查：Safari 等浏览器返回的可能是 File 或其他 BlobLike 对象
                  if (blob && (blob instanceof Blob || typeof blob.size === 'number')) {
                    chImgs.push(URL.createObjectURL(blob));
                  }
                }
              }
              chapters.push({
                title: rec.chaptersMeta[ci].title,
                url: rec.chaptersMeta[ci].url || '',
                images: chImgs
              });
              totalImgs += chImgs.length;
            }
          } else if (rec.chapters && Array.isArray(rec.chapters)) {
            // 旧版格式兼容
            for (var c = 0; c < rec.chapters.length; c++) {
              var chImages = [];
              if (rec.chapters[c].imageBlobs) {
                for (var b = 0; b < rec.chapters[c].imageBlobs.length; b++) {
                  var blob2 = rec.chapters[c].imageBlobs[b];
                  if (blob2 && (blob2 instanceof Blob || typeof blob2.size === 'number')) {
                    chImages.push(URL.createObjectURL(blob2));
                  }
                }
              }
              chapters.push({ title: rec.chapters[c].title, url: rec.chapters[c].url || '', images: chImages });
              totalImgs += chImages.length;
            }
          } else {
            continue;
          }

          var coverBlobUrl = '';
          if (rec.cover) {
            if (rec.cover instanceof Blob || typeof rec.cover.size === 'number') {
              coverBlobUrl = URL.createObjectURL(rec.cover);
            } else {
              coverBlobUrl = rec.cover;
            }
          }

          var comic = {
            title: rec.title,
            author: rec.author,
            desc: rec.desc,
            tags: rec.tags || [],
            cover: coverBlobUrl,
            sourceName: rec.sourceName,
            chapters: chapters,
            downloadedAt: rec.downloadedAt,
            totalImages: totalImgs
          };
          offlineLibrary[rec.comicUrl] = comic;
          restoredCount++;
          log('恢复 "' + rec.title + '" · ' + chapters.length + '章 · ' + totalImgs + '张');
        }
        var count = Object.keys(offlineLibrary).length;
        if (count > 0) log('从 IndexedDB 恢复 ' + count + ' 部离线漫画');
      } catch(e) {
        log('IndexedDB 恢复失败: ' + e.message);
      }
    }

    // 保存一部漫画到 IndexedDB（blobUrl → Blob）
    // 保存整部漫画到 IndexedDB（用于初始保存封面等元信息）
    async function saveComicToIDB(comicUrl) {
      var comic = offlineLibrary[comicUrl];
      if (!comic) return;
      try {
        var coverBlob = null;
        if (comic.cover && comic.cover.indexOf('blob:') === 0) {
          coverBlob = await blobUrlToBlob(comic.cover);
        } else if (comic.cover) {
          coverBlob = comic.cover;
        }

        // 只存元信息和章节结构，图片单独按章存（避免单条记录过大）
        var chaptersMeta = [];
        for (var i = 0; i < comic.chapters.length; i++) {
          chaptersMeta.push({
            title: comic.chapters[i].title,
            url: comic.chapters[i].url,
            imageCount: comic.chapters[i].images ? comic.chapters[i].images.length : 0,
            hasImages: comic.chapters[i].images && comic.chapters[i].images.length > 0
          });
        }

        var record = {
          comicUrl: comicUrl,
          title: comic.title,
          author: comic.author,
          desc: comic.desc,
          tags: comic.tags,
          cover: coverBlob,
          sourceName: comic.sourceName,
          chaptersMeta: chaptersMeta,
          totalImages: comic.totalImages,
          downloadedAt: comic.downloadedAt
        };
        await idbPut(record);

        // 逐章保存图片（避免单个事务过大）
        for (var ci = 0; ci < comic.chapters.length; ci++) {
          if (comic.chapters[ci].images && comic.chapters[ci].images.length > 0) {
            await saveChapterImagesToIDB(comicUrl, ci, comic.chapters[ci].images);
          }
        }
        log('已保存到 IndexedDB: ' + comic.title);
      } catch(e) {
        log('保存到 IndexedDB 失败: ' + e.message);
      }
    }

    // 单章图片保存到 IDB（独立事务，避免单条记录过大）

    // blobs 参数是原始 Blob 数组（由 downloadImagesBatch 直接返回），不再 fetch(blobUrl) 绕弯子
    async function saveChapterImagesToIDB(comicUrl, chapterIdx, blobs) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);

          // 用 tx.oncomplete 确认数据真正写入磁盘，而不是 putReq.onsuccess（那只是放入队列）
          tx.oncomplete = function() { resolve(); };
          tx.onabort = function() { reject(new Error('IndexedDB 事务被中止，可能超出存储配额')); };
          tx.onerror = function(e) { reject(e.target.error || new Error('IndexedDB 事务错误')); };

          var getReq = store.get(comicUrl);
          getReq.onsuccess = function() {
            var record = getReq.result || { comicUrl: comicUrl };
            if (!record.chapterImages) record.chapterImages = {};
            // 直接保存原始 Blob（已经是 Blob 对象，无需 fetch 转换）
            record.chapterImages[chapterIdx] = blobs.filter(function(b) { return b instanceof Blob; });
            // 同步更新 chaptersMeta（确保 title/url 也有，否则恢复时找不到章节）
            if (!record.chaptersMeta) record.chaptersMeta = [];
            var chapterTitle = currentChapters[chapterIdx] ? currentChapters[chapterIdx].title : '';
            var chapterUrl = currentChapters[chapterIdx] ? currentChapters[chapterIdx].url : '';
            record.chaptersMeta[chapterIdx] = {
              title: chapterTitle,
              url: chapterUrl,
              imageCount: record.chapterImages[chapterIdx].length,
              hasImages: record.chapterImages[chapterIdx].length > 0
            };
            var putReq = store.put(record);
            putReq.onerror = function(e) { reject(e.target.error); };
          };
          getReq.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    // 更新漫画元信息到 IDB（章节结构、总数等）
    async function updateComicMetaInIDB(comicUrl) {
      var comic = offlineLibrary[comicUrl];

      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');

          tx.oncomplete = function() { resolve(); };
          tx.onabort = function() { reject(new Error('元信息保存事务被中止')); };
          tx.onerror = function(e) { reject(e.target.error || new Error('IndexedDB 事务错误')); };

          var getReq = store.get(comicUrl);
          getReq.onsuccess = function() {
            var record = getReq.result || { comicUrl: comicUrl };
            // 更新元信息
            record.title = comic.title;

            record.desc = comic.desc;
            record.tags = comic.tags;
            record.sourceName = comic.sourceName;
            record.totalImages = comic.totalImages;
            record.downloadedAt = comic.downloadedAt;
            // 更新 chaptersMeta（保留已有的 imageCount/hasImages，防止覆盖 saveChapterImagesToIDB 写入的章节信息）
            if (!record.chaptersMeta) record.chaptersMeta = [];
            for (var i = 0; i < comic.chapters.length; i++) {
              var existing = record.chaptersMeta[i] || {};
              record.chaptersMeta[i] = {
                title: comic.chapters[i].title,
                url: comic.chapters[i].url,
                imageCount: existing.imageCount || (comic.chapters[i].images ? comic.chapters[i].images.length : 0),
                hasImages: existing.hasImages || (comic.chapters[i].images && comic.chapters[i].images.length > 0)
              };
            }
            var putReq = store.put(record);
            putReq.onerror = function(e) { reject(e.target.error); };
          };
          getReq.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function fixProxyUrl(url, baseUrl) {
      if (!url) return '';
      url = url.replace(/https?:\/\/api\.allorigins\.win/g, '');
      url = url.replace(/https?:\/\/corsproxy\.io\/?\?url=[^&]*/g, function(m) {
        try {
          var u = m.match(/url=([^&]+)/);
          return u ? decodeURIComponent(u[1]) : '';
        } catch(e) { return ''; }
      });
      url = url.replace(/https?:\/\/api\.codetabs\.com\/v1\/proxy\/\?quest=/g, '');
      url = url.replace(/https?:\/\/api\.whateverorigin\.org\/get\?url=/g, '');
      if (url && url.indexOf('http') !== 0 && url.charAt(0) === '/') {
        url = (baseUrl || '') + url;
      }
      return url;

    async function fetchWithProxies(targetUrl, referer, timeoutMs, cancelSignal) {
      timeoutMs = timeoutMs || 12000;
      showSourceInfo('正在加载... (竞速模式)', 'loading');

      // 竞速模式：同时发起所有代理请求，取第一个成功的
      var controllers = [];
      var promises = CORS_PROXIES.map(function(proxyFn, proxyIdx) {
        var controller = createTimeoutController(timeoutMs);
        controllers.push(controller);
        // 监听外部取消信号
        if (cancelSignal) {
          if (cancelSignal.aborted) controller.abort();
          else cancelSignal.addEventListener('abort', function() { controller.abort(); });
        }
        return fetch(proxyFn(targetUrl), { signal: controller.signal })
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.text();
          })
          .then(function(text) {
            // 解析 JSON 包裹
            try {
              var json = JSON.parse(text);
              if (json && json.contents) text = json.contents;
              else if (json && json.data) text = typeof json.data === 'string' ? json.data : text;
              else if (json && json.html) text = json.html;
            } catch (e) {}

            if (text && text.length > 200 && (text.indexOf('<') !== -1 || text.indexOf('http') !== -1)) {
              return { text: text, proxyIdx: proxyIdx };
            }
            throw new Error('内容无效');
          });
      });

      try {
        var result = await Promise.any(promises);
        log('代理' + result.proxyIdx + ' 竞速胜出!');
        lastWorkingProxy = result.proxyIdx;
        hideSourceInfo();
        // 中断其他请求
        for (var c = 0; c < controllers.length; c++) {
          try { controllers[c].abort(); } catch(e) {}
        }
        return result.text;
      } catch(e) {
        hideSourceInfo();
        throw new Error('所有代理均不可用');
      }
    }

    function extractImagesFromScript(html) {
      var images = [];
      var imgUrlPattern = /"((?:https?:\/\/|\/\/)[^"']+\.(?:jpg|jpeg|png|webp|gif)(?:\?[^"']*)?)"/gi;
      var matches = html.match(imgUrlPattern);
      if (matches) {
        for (var i = 0; i < matches.length; i++) {
          var url = matches[i].replace(/^"|"$/g, '');
          if (url.indexOf('//') === 0) url = 'https:' + url;
          if (url.length > 30 && url.indexOf('logo') === -1 && url.indexOf('avatar') === -1 && url.indexOf('icon') === -1 && url.indexOf('placeholder') === -1) {
            images.push(url);
          }
        }
      }
      var jsonPatterns = [
        /window\.__NUXT__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /window\.__INITIAL_STATE__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /var\s+chapterImages\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+imageList\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+pageImages\s*=\s*\[([\s\S]*?)\]/i,
        /images\s*:\s*\[([\s\S]*?)\]/i
      ];
      for (var j = 0; j < jsonPatterns.length; j++) {
        var m = html.match(jsonPatterns[j]);
        if (m) {
          try {
            var urls = m[0].match(/https?:\/\/[^"'\s]+\.(jpg|jpeg|png|webp|gif)/gi);
            if (urls) {
              for (var k = 0; k < urls.length; k++) {
                if (urls[k].length > 30 && images.indexOf(urls[k]) === -1) {
                  images.push(urls[k]);
                }
              }
            }
          } catch (e) {}
        }
      }
      var uniqueImages = [];
      var seen = {};
      for (var u = 0; u < images.length; u++) {
        if (!seen[images[u]]) {
          seen[images[u]] = true;
          uniqueImages.push(images[u]);
        }
      }
      return uniqueImages;
    }

    // ==================== 章节排序 ====================
    function getChapterSortKey(title) {
      if (!title) return Infinity;

      var chineseMap = {'零':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100,'千':1000};

      function chineseStrToNum(s) {
        if (/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
        if (!s) return NaN;
        if (s.length === 1) return chineseMap[s] !== undefined ? chineseMap[s] : NaN;
        if (s[0] === '十') { var r = chineseStrToNum(s.slice(1)); return 10 + (isNaN(r) ? 0 : r); }
        if (s[s.length - 1] === '十') { var f = chineseStrToNum(s.slice(0, -1)); return isNaN(f) ? 10 : f * 10; }
        if (s.indexOf('十') !== -1) {
          var parts = s.split('十');
          var a = parts[0] ? chineseStrToNum(parts[0]) : 0;
          var b = parts[1] ? chineseStrToNum(parts[1]) : 0;
          return (isNaN(a) || isNaN(b)) ? NaN : a * 10 + b;
        }
        if (s.indexOf('百') !== -1) {
          var parts2 = s.split('百');
          var a2 = parts2[0] ? chineseStrToNum(parts2[0]) : 1;
          var b2 = parts2[1] ? chineseStrToNum(parts2[1]) : 0;
          return (isNaN(a2) || isNaN(b2)) ? NaN : a2 * 100 + b2;
        }
        return NaN;
      }

      var patterns = [
        /第\s*([\d.]+)\s*[话回章节篇卷集]/,
        /第\s*([一二三四五六七八九十百千零两\d.]+)\s*[话回章节篇卷集]/,
        /chapter\s*([\d.]+)/i,
        /(?:^|[\s(\[【（])\s*(\d+(?:\.\d+)?)\s*(?:[话回章节篇卷集]?)/,
        /([\d.]+)/
      ];

      for (var i = 0; i < patterns.length; i++) {
        var m = title.match(patterns[i]);
        if (m) {
          var num = chineseStrToNum(m[1]);
          if (!isNaN(num)) return num;
        }
      }
      return Infinity;
    }

    function sortChapters(chapters) {
      if (!chapters || chapters.length <= 1) return;
      for (var i = 0; i < chapters.length; i++) {
        chapters[i]._sortKey = getChapterSortKey(chapters[i].title);
      }
      chapters.sort(function(a, b) { return a._sortKey - b._sortKey; });
      for (var j = 0; j < chapters.length; j++) {
        delete chapters[j]._sortKey;
      }
    }

    // ==================== 图片提取（公共函数） ====================
    // 章节HTML缓存（避免预加载和下载时重复抓取）
    var chapterHtmlCache = {};

    async function fetchChapterImages(index) {
      var chapter = currentChapters[index];
      if (!chapter) return { images: [], fromScript: false };
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      // 优先使用缓存的HTML

      if (!html) {

        chapterHtmlCache[chapter.url] = html;
      }
      var doc = parseHTML(html);
      var images = [];
      var scriptImages = extractImagesFromScript(html);
      var fromScript = false;

      if (scriptImages.length >= 5) {
        log('从脚本数据提取 ' + scriptImages.length + ' 张图片');
        images = scriptImages.slice();
        fromScript = true;
      } else {
        var containerSelectors = src.selectors.images || ['.comic-content', 'article'];
        for (var cs = 0; cs < containerSelectors.length; cs++) {
          var container = doc.querySelector(containerSelectors[cs]);
          if (container) {
            var imgs = container.querySelectorAll('amp-img, img');
            for (var i = 0; i < imgs.length; i++) {
              var imgsrc = getImgSrc(imgs[i]);
              imgsrc = imgsrc ? fixProxyUrl(imgsrc, src.domains[currentDomainIndex]) : '';
              if (imgsrc && imgsrc.indexOf('http') === 0 && !imgsrc.match(/\.(js|css|ico|svg)$/i) && imgsrc.indexOf('placeholder') === -1 && imgsrc.indexOf('avatar') === -1 && imgsrc.indexOf('logo') === -1 && imgsrc.indexOf('icon') === -1 && imgsrc.length > 30) {
                images.push(imgsrc);
              }
            }
            if (images.length >= 3) {
              log('找到图片容器: ' + containerSelectors[cs] + ' (' + images.length + '张)');
              break;
            }
          }
        }
        if (images.length < 3) {
          var allImgs = doc.querySelectorAll('img[src*="http"], amp-img[src*="http"]');
          for (var ai = 0; ai < allImgs.length; ai++) {
            var asrc = getImgSrc(allImgs[ai]);
            asrc = asrc ? fixProxyUrl(asrc, src.domains[currentDomainIndex]) : '';
            if (asrc && asrc.indexOf('http') === 0 && !asrc.match(/\.(js|css|ico|svg)$/i) && asrc.indexOf('placeholder') === -1 && asrc.indexOf('avatar') === -1 && asrc.indexOf('logo') === -1 && asrc.indexOf('icon') === -1 && asrc.length > 30) {
              if (images.indexOf(asrc) === -1) images.push(asrc);
            }
          }
        }
      }

      for (var k = 0; k < images.length; k++) {
        images[k] = fixProxyUrl(images[k], src.domains[currentDomainIndex]);
        if (images[k].indexOf('//') === 0) images[k] = 'https:' + images[k];
      }
      return { images: images, fromScript: fromScript };
    }

    // ==================== 离线下载 ====================
    // 图片下载：代理竞速模式（同时发起多个请求，谁先成功用谁）
    var imageProxyCache = {};
    async function fetchImageAsBlob(url) {
      if (!url) return null;
      // blob: URL 直接读取
      if (url.indexOf('blob:') === 0) {
        try { return await (await fetch(url)).blob(); } catch(e) { return null; }
      }

      // === 第一阶段：直连优先（命中浏览器缓存则毫秒级返回） ===
      // 先直接请求原图，不通过代理。如果用户之前阅读过，浏览器缓存可能命中，瞬间返回。
      try {
        var directController = createTimeoutController(3000);
        if (downloadAbortController) {
          if (downloadAbortController.signal.aborted) directController.abort();
          else downloadAbortController.signal.addEventListener('abort', function() { directController.abort(); });
        }
        var directResp = await fetch(url, {
          signal: directController.signal,
          mode: 'cors',
          credentials: 'omit'
        });
        if (directResp.ok) {
          var directBlob = await directResp.blob();
          if (isValidImageBlob(directBlob)) {
            return directBlob;
          }
        }
      } catch(e) {
        // 直连失败（CORS / 网络问题），继续走代理
      }

      // === 第二阶段：代理竞速 ===
      var proxies = [
        function(u) { return 'https://wsrv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//, '')); },
        function(u) { return 'https://images.weserv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//, '')); },
        function(u) { return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u); },
        function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); }
      ];

      var controllers = [];
      var promises = proxies.map(function(proxyFn, i) {
        var controller = createTimeoutController(8000);
        controllers.push(controller);
        if (downloadAbortController) {
          if (downloadAbortController.signal.aborted) controller.abort();
          else downloadAbortController.signal.addEventListener('abort', function() { controller.abort(); });
        }
        return fetch(proxyFn(url), { signal: controller.signal })
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.blob();
          })
          .then(function(blob) {
            if (!isValidImageBlob(blob)) throw new Error('not valid image');
            return blob;
          });
      });

      try {
        var blob = await Promise.any(promises);
        for (var c = 0; c < controllers.length; c++) {
          try { controllers[c].abort(); } catch(e) {}
        }
        return blob;
      } catch(e) {
        // 所有代理都失败时，最后尝试直连（长超时，部分 CDN 响应慢）
        try {
          var finalController = createTimeoutController(15000);
          var finalResp = await fetch(url, { signal: finalController.signal, mode: 'cors', credentials: 'omit' });
          if (finalResp.ok) {
            var finalBlob = await finalResp.blob();
            if (isValidImageBlob(finalBlob)) return finalBlob;
          }
        } catch(e2) {}
        return null;
      }
    }

    // 严格校验图片 Blob
    function isValidImageBlob(blob) {
      if (!blob || blob.size < 1000) return false;
      // 有明确 MIME 类型的，必须是图片
      if (blob.type && blob.type.indexOf('image') === -1) return false;
      if (blob.type && blob.type.indexOf('image') !== -1) return true;
      // 没有 MIME 类型但体积够大，大概率是图片（代理服务器可能返回空类型）
      // 部分代理返回的图片 MIME 为空但体积较小，放宽到 2KB
      return blob.size > 2000;
    }

    // 并行下载图片（batchSize 张一批）
    // 返回 { url: blobUrl, blob: originalBlob } 数组，避免后续 fetch 绕弯子
    async function downloadImagesBatch(urls, onProgress, batchSize) {
      batchSize = batchSize || 3;
      var results = new Array(urls.length);
      var completed = 0;
      var queue = [];
      for (var i = 0; i < urls.length; i++) queue.push(i);

      async function worker() {
        while (queue.length > 0 && !downloadCancelled) {
          var idx = queue.shift();
          if (idx === undefined) break;
          try {
            var blob = await fetchImageAsBlob(urls[idx]);
            results[idx] = blob ? { url: URL.createObjectURL(blob), blob: blob } : null;
          } catch(e) {
            results[idx] = null;
          }
          if (downloadCancelled) break;
          completed++;
          if (onProgress) onProgress(completed, urls.length);
        }
      }

      var workers = [];
      for (var w = 0; w < batchSize; w++) workers.push(worker());
      await Promise.all(workers);

      // 第二轮：重试失败的图片（偶尔代理超时，重试一次往往能成功）
      if (!downloadCancelled) {
        var retryQueue = [];
        for (var ri = 0; ri < results.length; ri++) {
          if (!results[ri]) retryQueue.push(ri);
        }
        if (retryQueue.length > 0) {
          log('重试 ' + retryQueue.length + ' 张失败图片...');
          for (var rj = 0; rj < retryQueue.length; rj++) {
            if (downloadCancelled) break;
            var idx = retryQueue[rj];
            try {
              var blob = await fetchImageAsBlob(urls[idx]);
              if (blob) {
                results[idx] = { url: URL.createObjectURL(blob), blob: blob };
                completed++;
                if (onProgress) onProgress(completed, urls.length);
              }
            } catch(e) {}
          }
        }
      }

      return results;
    }

          var end = Math.max(rangeStart, idx);
          var allCbs = listEl.querySelectorAll('input[type="checkbox"]:not(:disabled)');
          for (var c = 0; c < allCbs.length; c++) {
            var cbIdx = parseInt(allCbs[c].value);
            if (cbIdx >= start && cbIdx <= end) {
              allCbs[c].checked = true;
            }
          }
          label.classList.add('range-end');
          rangeMode = false;
          rangeBtn.classList.remove('active');
          rangeBtn.textContent = '范围选择';
          rangeStart = -1;
          updateCount();
          // 清除高亮
          setTimeout(function() {
            var highlights = listEl.querySelectorAll('.chapter-select-item.range-start, .chapter-select-item.range-end');
            for (var h = 0; h < highlights.length; h++) {
              highlights[h].classList.remove('range-start', 'range-end');
            }
          }, 1000);
        }
        e.preventDefault();
        e.stopPropagation();
      }, true); // 使用捕获阶段，在checkbox默认行为之前拦截

      document.getElementById('chapterSelectAll').onclick = function() {
        var cbs = listEl.querySelectorAll('input[type="checkbox"]:not(:disabled)');
        for (var i = 0; i < cbs.length; i++) cbs[i].checked = true;
        updateCount();
      };
      document.getElementById('chapterSelectNone').onclick = function() {
        var cbs = listEl.querySelectorAll('input[type="checkbox"]:not(:disabled)');
        for (var i = 0; i < cbs.length; i++) cbs[i].checked = false;
        updateCount();
      };
      document.getElementById('chapterSelectInvert').onclick = function() {
        var cbs = listEl.querySelectorAll('input[type="checkbox"]:not(:disabled)');
        for (var i = 0; i < cbs.length; i++) cbs[i].checked = !cbs[i].checked;
        updateCount();
      };

      document.getElementById('chapterSelectCancel').onclick = function() {
        overlay.classList.remove('active');
      };

      confirmBtn.onclick = function() {
        var cbs = listEl.querySelectorAll('input[type="checkbox"]:checked');
        var indices = [];
        for (var i = 0; i < cbs.length; i++) indices.push(parseInt(cbs[i].value));
        if (indices.length === 0) return;
        overlay.classList.remove('active');
        downloadComicOffline(indices);
      };

      overlay.classList.add('active');
    }

    async function downloadComicOffline(selectedIndices) {
      if (!currentComicUrl || currentChapters.length === 0) {
        alert('请先加载漫画详情页');
        return;
      }

      // 默认下载全部
      if (!selectedIndices || selectedIndices.length === 0) {
        selectedIndices = [];
        for (var i = 0; i < currentChapters.length; i++) selectedIndices.push(i);
      }

      downloadCancelled = false;
      downloadAbortController = new AbortController();
      var totalToDownload = selectedIndices.length;
      showDownloadProgress(totalToDownload, currentComicTitle);

      // 获取/创建 comicData（保留已下载的章节）
      var coverSrc = '';
      var coverImg = document.querySelector('.comic-detail-cover');
      if (coverImg && coverImg.src) coverSrc = coverImg.src;
      var authorText = '';
      var authorEl = document.querySelector('.comic-detail-author');
      if (authorEl) authorText = authorEl.textContent.trim();
      var descText = '';
      var descEl = document.querySelector('.comic-detail-desc');
      if (descEl) descText = descEl.textContent.trim();
      var tags = [];
      var tagEls = document.querySelectorAll('.comic-detail-tag');
      for (var t = 0; t < tagEls.length; t++) tags.push(tagEls[t].textContent.trim());

      var comicData = offlineLibrary[currentComicUrl];
      if (!comicData) {
        // 下载封面
        var coverBlobUrl = '';
        if (coverSrc && coverSrc.indexOf('http') === 0) {
          updateDownloadProgress(0, totalToDownload, '正在下载封面...');
          var coverBlob = await fetchImageAsBlob(coverSrc);
          if (coverBlob) coverBlobUrl = URL.createObjectURL(coverBlob);
        }
        comicData = {
          title: currentComicTitle,
          author: authorText,
          desc: descText,
          tags: tags,
          cover: coverBlobUrl || coverSrc,
          sourceName: currentSource ? currentSource.name : '',
          chapters: [],
          downloadedAt: Date.now(),
          totalImages: 0
        };
        for (var i = 0; i < currentChapters.length; i++) {
          comicData.chapters.push({ title: currentChapters[i].title, url: currentChapters[i].url, images: [] });
        }
        offlineLibrary[currentComicUrl] = comicData;
      }

      // 第一阶段：并行解析所有选中章节的图片URL（4 章并发）
      // 先把所有章节的图片 URL 解析出来，再统一下载，避免解析时下载线程空转
      updateDownloadProgress(0, totalToDownload, '正在解析章节列表...', 0, 0);
      var chapterImageUrls = [];
      var parseQueue = [];
      for (var pi = 0; pi < selectedIndices.length; pi++) {
        parseQueue.push(pi);
        chapterImageUrls.push(null);
      }
      var parseConcurrency = 4;

      async function parseWorker() {
        while (parseQueue.length > 0 && !downloadCancelled) {
          var pi = parseQueue.shift();
          if (pi === undefined) break;
          var chapterIdx = selectedIndices[pi];
          var chapterTitle = currentChapters[chapterIdx].title;
          try {
            var result = await fetchChapterImages(chapterIdx);
            chapterImageUrls[pi] = result.images || [];
          } catch(e) {
            chapterImageUrls[pi] = [];
            log('解析"' + chapterTitle + '"失败: ' + e.message);
          }
        }
      }

      var parseWorkers = [];
      for (var pw = 0; pw < parseConcurrency; pw++) parseWorkers.push(parseWorker());
      await Promise.all(parseWorkers);

      if (downloadCancelled) {
        hideDownloadProgress();
        log('下载已取消');
        loadComicDetail(currentComicUrl, currentComicTitle);
        return;
      }

      // 第二阶段：逐章下载图片
      var totalAllImages = 0;
      var doneAllImages = 0;
      for (var ti = 0; ti < chapterImageUrls.length; ti++) {
        totalAllImages += (chapterImageUrls[ti] || []).length;
      }

      for (var si = 0; si < selectedIndices.length; si++) {
        if (downloadCancelled) { hideDownloadProgress(); log('下载已取消'); loadComicDetail(currentComicUrl, currentComicTitle); return; }

        var chapterIdx = selectedIndices[si];
        var chapterTitle = currentChapters[chapterIdx].title;
        var imageUrls = chapterImageUrls[si] || [];

        if (imageUrls.length === 0) {
          log('"' + chapterTitle + '"未提取到图片');
          comicData.chapters[chapterIdx].images = [];
          continue;
        }

        // 阶段2：并行下载图片（3 张并发，平衡速度与内存）
        var chapterStartImages = doneAllImages;
        var downloadResults = await downloadImagesBatch(imageUrls, function(completed, total) {
          if (downloadCancelled) return;
          doneAllImages = chapterStartImages + completed;
          updateDownloadProgress(si, totalToDownload, chapterTitle, completed, total);
        }, 3);

        // 过滤掉 null，拆分为 blobUrl 数组和原始 Blob 数组
        var validUrls = [];
        var blobsForSave = [];
        for (var k = 0; k < downloadResults.length; k++) {
          if (downloadResults[k]) {
            validUrls.push(downloadResults[k].url);
            blobsForSave.push(downloadResults[k].blob);
          }
        }

        // 如果已有旧图片，先释放
        var oldImages = comicData.chapters[chapterIdx].images || [];
        for (var oi = 0; oi < oldImages.length; oi++) {
          if (oldImages[oi].indexOf('blob:') === 0) URL.revokeObjectURL(oldImages[oi]);
        }

        comicData.chapters[chapterIdx].images = validUrls;
        comicData.totalImages = 0;
        for (var ci = 0; ci < comicData.chapters.length; ci++) {
          comicData.totalImages += comicData.chapters[ci].images.length;
        }
        log('下载"' + chapterTitle + '"完成: ' + validUrls.length + '/' + imageUrls.length + '张');

        // 每章下载完立即存 IndexedDB（增量保存，避免最后一次性存太多）
        // 直接用下载时得到的原始 Blob，避免 fetch(blobUrl) 绕弯子卡住
        if (!downloadCancelled && blobsForSave.length > 0) {
          updateDownloadProgress(si, totalToDownload, chapterTitle + ' (保存中)', blobsForSave.length, blobsForSave.length);
          try {
            await saveChapterImagesToIDB(currentComicUrl, chapterIdx, blobsForSave);
          } catch(e) {
            log('保存"' + chapterTitle + '"到 IndexedDB 失败: ' + (e.message || e));
          }
        }
      }

      // 最后保存一次元信息（确保 chaptersMeta 和 totalImages 是最新的）
      try {
        await updateComicMetaInIDB(currentComicUrl);
      } catch(e) {
        log('更新元信息失败: ' + (e.message || e));
      }

      hideDownloadProgress();
      log('下载完成: ' + comicData.title + ' · 共' + comicData.totalImages + '张图片');
      loadComicDetail(currentComicUrl, currentComicTitle);
    }

    function removeOfflineComic(comicUrl, skipRefresh) {
      var comic = offlineLibrary[comicUrl];
      if (!comic) return;
      for (var i = 0; i < comic.chapters.length; i++) {
        if (comic.chapters[i].images) {
          for (var j = 0; j < comic.chapters[i].images.length; j++) {
            URL.revokeObjectURL(comic.chapters[i].images[j]);
          }
        }
      }
      if (comic.cover && comic.cover.indexOf('blob:') === 0) URL.revokeObjectURL(comic.cover);
      delete offlineLibrary[comicUrl];
      // 同步删除 IndexedDB 记录
      idbDelete(comicUrl).catch(function(e) { log('IDB删除失败: ' + e.message); });
      log('已删除离线漫画: ' + comic.title);
      if (!skipRefresh) {
        if (currentView === 'detail' || currentComicUrl === comicUrl) loadComicDetail(currentComicUrl, currentComicTitle);
        else showOfflineLibrary();
      }
    }

    function isComicDownloaded(comicUrl) {
      var comic = offlineLibrary[comicUrl];
      if (!comic || !comic.chapters || comic.chapters.length === 0) return false;
      for (var i = 0; i < comic.chapters.length; i++) {
        if (comic.chapters[i].images && comic.chapters[i].images.length > 0) return true;
      }
      return false;
    }
